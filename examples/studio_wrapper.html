<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>*{margin:0;padding:0}html,body{height:100%;overflow:hidden}</style>
</head>
<body>
<iframe id="app" style="width:100%;height:100%;border:none"></iframe>
<script>
// Cache-bust: always load latest version of the web app
document.getElementById("app").src =
  "https://maxpy-studio.vercel.app/?embedded=true&t=" + Date.now();

// Bridge: receive postMessage from iframe, forward to Max
window.addEventListener("message", function (e) {
  if (e.data && e.data.type === "save_amxd" && typeof max !== "undefined") {
    max.outlet("save_amxd", e.data.b64);
  }
});
</script>
</body>
</html>
